name: Rust CI with Codacy Coverage

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust and tools
        run: |
          rustup component add llvm-tools-preview
          cargo install grcov
      - name: Run tests with coverage
        run: |
          export RUSTFLAGS="-Cinstrument-coverage"
          export LLVM_PROFILE_FILE="rust-coverage-%p-%m.profraw"
          cargo test --workspace --verbose
          grcov . --binary-path ./target/debug/ -s . -t lcov --branch --ignore-not-existing -o ./coverage.lcov
      - name: Upload to Codacy
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_COVERAGE }}
        run: |
          # Only include Rust files (*.rs) in coverage analysis
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
            -l Rust \
            -r ./coverage.lcov \
            --partial
